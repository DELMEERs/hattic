name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: hattic-linux-amd64
          - os: windows-latest
            platform: windows/amd64
            artifact_name: hattic-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile "npcap-sdk.zip"
          Expand-Archive -Path "npcap-sdk.zip" -DestinationPath "C:\npcap-sdk"
          echo "CPATH=C:\npcap-sdk\Include" >> $env:GITHUB_ENV
          echo "LIBRARY_PATH=C:\npcap-sdk\Lib\x64" >> $env:GITHUB_ENV

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Wails App
        run: |
          if ("${{ matrix.os }}" -eq "ubuntu-latest") {
            wails build -platform ${{ matrix.platform }} -o ${{ matrix.artifact_name }} -tags webkit2gtk_41
          } else {
            wails build -platform ${{ matrix.platform }} -o ${{ matrix.artifact_name }}
          }
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/bin/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}